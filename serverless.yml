org: johngriffin
app: deribit-data-collector
service: deribit-data-collector

frameworkVersion: '3'


provider:
  name: aws
  runtime: python3.8
  region: us-east-1
  iamRoleStatements:
    - Effect: "Allow"
      Action:
       - dynamodb:Query
       - dynamodb:Scan
       - dynamodb:GetItem
       - dynamodb:PutItem
       - dynamodb:UpdateItem
       - dynamodb:DeleteItem
       - dynamodb:DescribeTable
       - dynamodb:BatchWriteItem
      Resource: "arn:aws:dynamodb:us-east-1:538881967423:table/deribit_btc"
    - Effect: "Allow"
      Action:
       - dynamodb:Query
       - dynamodb:Scan
       - dynamodb:GetItem
       - dynamodb:PutItem
       - dynamodb:UpdateItem
       - dynamodb:DeleteItem
       - dynamodb:DescribeTable
       - dynamodb:BatchWriteItem
      Resource: "arn:aws:dynamodb:us-east-1:538881967423:table/deribit_eth"

functions:
  rateHandler:
    handler: handler.run
    events:
      # Invoke Lambda function every minute
      - schedule: rate(1 hour)
    layers:
      - arn:aws:lambda:us-east-1:336392948345:layer:AWSDataWrangler-Python38:2
    timeout: 400

# ---------------------------------------------------------------------------
# Storage is intentionally NOT managed by this stack. The DynamoDB tables
# (deribit_btc, deribit_eth) and the archive bucket (deribit-archive-538881967423,
# S3 -> Glacier Deep Archive) are managed externally via the AWS CLI so that
# data operations (export / truncate) cannot be affected by a CloudFormation
# rollback. See README "Storage Architecture & Cost Management" for the full
# record, runbook, and how to reconcile the Glacier archive with the live table.
# ---------------------------------------------------------------------------

