org: johngriffin
app: deribit-data-collector
service: deribit-data-collector

frameworkVersion: '3'


provider:
  name: aws
  runtime: python3.8
  region: us-east-1
  iamRoleStatements:
    - Effect: "Allow"
      Action:
       - dynamodb:Query
       - dynamodb:Scan
       - dynamodb:GetItem
       - dynamodb:PutItem
       - dynamodb:UpdateItem
       - dynamodb:DeleteItem
       - dynamodb:DescribeTable
       - dynamodb:BatchWriteItem
      Resource: "arn:aws:dynamodb:us-east-1:538881967423:table/deribit_btc"
    - Effect: "Allow"
      Action:
       - dynamodb:Query
       - dynamodb:Scan
       - dynamodb:GetItem
       - dynamodb:PutItem
       - dynamodb:UpdateItem
       - dynamodb:DeleteItem
       - dynamodb:DescribeTable
       - dynamodb:BatchWriteItem
      Resource: "arn:aws:dynamodb:us-east-1:538881967423:table/deribit_eth"

functions:
  rateHandler:
    handler: handler.run
    events:
      # Invoke Lambda function every minute
      - schedule: rate(1 hour)
    layers:
      - arn:aws:lambda:us-east-1:336392948345:layer:AWSDataWrangler-Python38:2
    timeout: 400

# ---------------------------------------------------------------------------
# Storage / cost-management infrastructure. See README "Storage Architecture
# & Cost Management" for the full plan, runbook, and reconciliation procedure.
# ---------------------------------------------------------------------------
resources:
  Resources:

    # Cold archive for DynamoDB -> S3 exports. Objects transition to Glacier
    # Deep Archive (~$0.00099/GB-mo). This is a NEW resource, safe to deploy.
    DeribitArchiveBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        BucketName: deribit-archive-538881967423
        LifecycleConfiguration:
          Rules:
            - Id: exports-to-deep-archive
              Status: Enabled
              Transitions:
                - StorageClass: DEEP_ARCHIVE
                  TransitionInDays: 1

    # -----------------------------------------------------------------------
    # The deribit_btc / deribit_eth tables were created manually in 2022 and
    # are NOT part of this stack. To bring them under serverless management,
    # UNCOMMENT the blocks below and IMPORT the existing tables FIRST
    # (CloudFormation cannot create a table that already exists). See README
    # "Apply runbook -> Step 1". DeletionPolicy: Retain guarantees the data
    # survives any rollback. Do NOT uncomment-and-deploy without importing.
    # -----------------------------------------------------------------------
